version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --include=optional
        - npm install --os=linux --cpu=x64 sharp
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
